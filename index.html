<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Zehava and the Three Bears</title>

  <link rel="stylesheet" href="style.css" />
<script src="js/scenes.js" defer></script>
<script src="js/gameState.js" defer></script>
<script src="js/player.js" defer></script>
<script src="js/inventory.js" defer></script>
<script src="js/dialogue.js" defer></script>
<script src="js/audio.js" defer></script>
<script src="js/main.js" defer></script>
</head>

<body>
  <main class="game-container">

    <section
      id="scene"
      class="scene"
      aria-label="Game scene"
    >

      <!-- Zehava Character -->
      <img
        id="zehava"
        class="zehava"
        src="assets/characters/1.png"
        alt="Zehava"
      />

      <!-- Clickable Objects -->
      <div
        id="objectLayer"
        class="object-layer"
        aria-label="Clickable objects"
      ></div>

      <!-- Dialogue Overlay -->
      <div
        id="dialogueOverlay"
        class="dialogue-overlay hidden"
      >
        <div class="dialogue-box">

          <img
            id="dialoguePortrait"
            class="dialogue-portrait"
            src="assets/characters/emotes/happy.png"
            alt="Zehava portrait"
          />

          <div class="dialogue-content">

            <p id="dialogueText" class="dialogue-text">
              Dialogue goes here
            </p>

            <button
              id="dialogueButton"
              class="dialogue-button"
            >
              Continue
            </button>

          </div>
        </div>
      </div>

      <!-- Lives UI -->
      <div id="livesUI" class="lives-ui">
        <img src="assets/ui/heart.png" class="life-icon" alt="Life" />
        <img src="assets/ui/heart.png" class="life-icon" alt="Life" />
        <img src="assets/ui/heart.png" class="life-icon" alt="Life" />
      </div>

      <!-- Inventory UI -->
      <div id="inventoryUI" class="inventory-ui">

  <div class="inventory-slot">
    <img
      id="chairInventoryIcon"
      src="assets/objects/just-right-chair.png"
      class="inventory-icon"
      alt="Right Chair"
    />
  </div>

  <div class="inventory-slot">
    <img
      id="porridgeInventoryIcon"
      src="assets/objects/just-right-porridge.png"
      class="inventory-icon"
      alt="Right Porridge"
    />
  </div>

  <div class="inventory-slot">
    <img
      id="bedInventoryIcon"
      src="assets/objects/just-right-bed.png"
      class="inventory-icon"
      alt="Right Bed"
    />
  </div>

  <img
    id="keyInventoryIcon"
    src="assets/objects/wooden-key.png"
    class="inventory-icon"
    alt="Wooden Key"
    style="display: none;"
  />

</div>

    </section>

  </main>
</body>
</html>
